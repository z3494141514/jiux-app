<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>后台管理 - 酒蕴茶乡</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; }
    textarea { width: 100%; height: 350px; padding: 10px; font-size: 14px; }
    button { padding: 10px 20px; margin-right: 10px; cursor: pointer; font-size: 16px; }
    #status { margin-bottom: 15px; color: #666; }
  </style>
</head>
<body>
  <h1>后台管理 - 数据编辑</h1>
  <div id="status">准备就绪</div>
  <textarea id="editor" placeholder="在这里编辑JSON数据..."></textarea>
  <br><br>
  <button onclick="loadData()">读取当前数据</button>
  <button onclick="saveData()">保存修改</button>
  <button onclick="location.reload()">刷新页面</button>

  <script>
    const API_URL = "/api/data";
    const statusEl = document.getElementById("status");
    const editorEl = document.getElementById("editor");

    async function loadData() {
      statusEl.textContent = "读取中...";
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        editorEl.value = json.data || "{}";
        statusEl.textContent = "数据已加载";
      } catch (e) {
        statusEl.textContent = "读取失败：" + e.message;
      }
    }

    async function saveData() {
      statusEl.textContent = "保存中...";
      try {
        await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: editorEl.value })
        });
        statusEl.textContent = "保存成功！前台将同步更新";
      } catch (e) {
        statusEl.textContent = "保存失败：" + e.message;
      }
    }

    // 页面加载时自动读取
    loadData();
  </script>
</body>
</html>
