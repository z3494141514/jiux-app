<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei;}
        body{background:#f5f7fa;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .header{background:#8c1c13;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:20px;}
        .tab-box{display:flex;background:#fff;border-radius:8px;overflow:hidden;margin-bottom:20px;flex-wrap:wrap;}
        .tab-item{padding:14px 20px;cursor:pointer;border:none;background:transparent;font-size:14px;color:#333;}
        .tab-item.active{background:#8c1c13;color:#fff;}
        .panel{background:#fff;padding:20px;border-radius:8px;display:none;margin-bottom:15px;}
        .panel.active{display:block;}
        .form-item{margin-bottom:16px;}
        label{display:block;margin-bottom:6px;color:#333;}
        input{width:300px;height:38px;padding:0 10px;border:1px solid #ccc;border-radius:4px;}
        select{width:300px;height:38px;padding:0 10px;border:1px solid #ccc;border-radius:4px;}
        button{padding:8px 20px;background:#8c1c13;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:8px;}
        button.gray{background:#999;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th,td{border:1px solid #eee;padding:10px;text-align:center;font-size:13px;}
        th{background:#f7f7f7;}
        .tip{color:#666;margin:8px 0;font-size:13px;}
        .mini-input{width:80px;height:30px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h2>酒蕴茶乡 综合管理后台</h2></div>

        <div class="tab-box">
            <button class="tab-item active" data-tab="config">全局参数</button>
            <button class="tab-item" data-tab="user">会员管理&充值</button>
            <button class="tab-item" data-tab="order">订单管理</button>
            <button class="tab-item" data-tab="withdraw">提现审核</button>
            <button class="tab-item" data-tab="rechargeLog">充值记录</button>
            <button class="tab-item" data-tab="releaseLog">算力释放日志</button>
        </div>

        <div class="panel active" id="panel-config">
            <h3>业务参数设置</h3>
            <p class="tip">修改后保存立即生效，影响全平台规则</p>
            <div class="form-item">
                <label>购买赠送算力倍数</label>
                <input type="number" id="powerRatio" step="0.1">
            </div>
            <div class="form-item">
                <label>每日算力释放小时(0-23)</label>
                <input type="number" id="releaseHour" min="0" max="23">
            </div>
            <div class="form-item">
                <label>每日算力释放比例</label>
                <input type="number" id="releaseRate" step="0.01">
            </div>
            <div class="form-item">
                <label>数字资产兑换酒豆比例</label>
                <input type="number" id="assetToBeanRate">
            </div>
            <button onclick="saveConfig()">保存配置</button>
        </div>

        <div class="panel" id="panel-user">
            <h3>会员列表 & 酒令充值</h3>
            <p class="tip">选中会员，填写充值数量，点击充值即可增加用户酒令</p>
            <div class="form-item">
                <label>选择会员手机号</label>
                <select id="userSelect"></select>
            </div>
            <div class="form-item">
                <label>充值酒令数量</label>
                <input type="number" id="rechargeNum" min="1" value="100">
            </div>
            <button onclick="userRecharge()">确认充值</button>

            <table>
                <thead>
                    <tr>
                        <th>会员ID(手机号)</th>
                        <th>总算力</th>
                        <th>数字资产</th>
                        <th>酒豆</th>
                        <th>酒令</th>
                        <th>注册时间</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>

        <div class="panel" id="panel-order">
            <h3>全部订单 & 状态修改</h3>
            <table>
                <thead>
                    <tr>
                        <th>订单ID</th>
                        <th>会员</th>
                        <th>商品编号</th>
                        <th>金额</th>
                        <th>当前状态</th>
                        <th>下单时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orderTable"></tbody>
            </table>
        </div>

        <div class="panel" id="panel-withdraw">
            <h3>用户酒豆提现审核</h3>
            <table>
                <thead>
                    <tr>
                        <th>申请ID</th>
                        <th>会员</th>
                        <th>提现酒豆数量</th>
                        <th>申请时间</th>
                        <th>当前状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="withdrawTable"></tbody>
            </table>
        </div>

        <div class="panel" id="panel-rechargeLog">
            <h3>后台酒令充值记录</h3>
            <table>
                <thead>
                    <tr>
                        <th>会员手机号</th>
                        <th>充值数量</th>
                        <th>充值时间</th>
                    </tr>
                </thead>
                <tbody id="rechargeLogTable"></tbody>
            </table>
        </div>

        <div class="panel" id="panel-releaseLog">
            <h3>每日算力释放记录</h3>
            <table>
                <thead>
                    <tr>
                        <th>释放日期</th>
                        <th>参与用户数</th>
                        <th>执行时间</th>
                    </tr>
                </thead>
                <tbody id="releaseLogTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "/api";
        // ⚠️ 务必修改为你在 Cloudflare 环境变量中设置的 ADMIN_KEY
        const ADMIN_KEY = 'jycx';

        let allUsers = [], allOrders = [], allWithdraws = [], allRecharges = [], allReleases = [];
        let config = {};

        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                let t = this.dataset.tab;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + t).classList.add('active');
                if (t === 'user') renderUser();
                if (t === 'order') renderOrder();
                if (t === 'withdraw') renderWithdraw();
                if (t === 'rechargeLog') renderRechargeLog();
                if (t === 'releaseLog') renderReleaseLog();
            })
        });

        async function loadAllData() {
            try {
                const res = await fetch(`${API_BASE}/admin`, {
                    headers: { 'X-Admin-Key': ADMIN_KEY }
                });
                const json = await res.json();
                if (json.code !== 0) {
                    alert("鉴权失败，请检查 ADMIN_KEY 是否正确");
                    return;
                }
                allUsers = json.users || [];
                allOrders = json.orders || [];
                allWithdraws = json.withdrawLog || [];
                allRecharges = json.rechargeLog || [];
                allReleases = json.releaseLog || [];

                // 加载配置
                const cfgRes = await fetch(`${API_BASE}/config`, {
                    headers: { 'X-Admin-Key': ADMIN_KEY }
                });
                const cfgJson = await cfgRes.json();
                config = cfgJson.config || {};
                document.getElementById('powerRatio').value = config.powerRatio || 2;
                document.getElementById('releaseHour').value = config.releaseHour || 8;
                document.getElementById('releaseRate').value = config.releaseRate || 0.05;
                document.getElementById('assetToBeanRate').value = config.assetToBeanRate || 5;

                renderAll();
            } catch (err) {
                alert("接口加载失败：" + err.message);
            }
        }

        async function saveConfig() {
            const newConfig = {
                powerRatio: document.getElementById('powerRatio').value,
                releaseHour: document.getElementById('releaseHour').value,
                releaseRate: document.getElementById('releaseRate').value,
                assetToBeanRate: document.getElementById('assetToBeanRate').value
            };
            await fetch(`${API_BASE}/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
                body: JSON.stringify(newConfig)
            });
            alert("配置保存成功！");
        }

        async function userRecharge() {
            const phone = document.getElementById('userSelect').value;
            const num = parseInt(document.getElementById('rechargeNum').value);
            if (!num || num <= 0) return alert("请输入合法充值数量");
            const res = await fetch(`${API_BASE}/recharge`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
                body: JSON.stringify({ phone, amount: num })
            });
            const data = await res.json();
            alert(data.msg || "充值完成");
            loadAllData();
        }

        async function changeOrderStatus(orderId, newStatus) {
            await fetch(`${API_BASE}/order-status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
                body: JSON.stringify({ orderId, status: newStatus })
            });
            alert("状态修改成功");
            loadAllData();
        }

        async function auditWithdraw(withdrawId, action) {
            const res = await fetch(`${API_BASE}/audit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
                body: JSON.stringify({ withdrawId, action })
            });
            const data = await res.json();
            alert(data.msg || "操作完成");
            loadAllData();
        }

        function renderAll() {
            loadUserSelect();
            renderUser();
            renderOrder();
            renderWithdraw();
            renderRechargeLog();
            renderReleaseLog();
        }

        function loadUserSelect() {
            const sel = document.getElementById('userSelect');
            sel.innerHTML = "";
            allUsers.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.phone;
                opt.innerText = u.phone;
                sel.appendChild(opt);
            });
        }

        function renderUser() {
            let html = "";
            if (allUsers.length === 0) {
                html = "<tr><td colspan='6'>暂无会员数据</td></tr>";
            } else {
                allUsers.forEach(u => {
                    html += `<tr>
                        <td>${u.phone}</td>
                        <td>${u.power}</td>
                        <td>${u.asset}</td>
                        <td>${u.bean}</td>
                        <td>${u.token}</td>
                        <td>${u.create_time}</td>
                    </tr>`;
                });
            }
            document.getElementById('userTable').innerHTML = html;
        }

        function renderOrder() {
            let html = "";
            if (allOrders.length === 0) {
                html = "<tr><td colspan='7'>暂无订单数据</td></tr>";
            } else {
                allOrders.forEach(o => {
                    const statusText = o.status === 'wait' ? '待发货' : (o.status === 'send' ? '已发货' : '已收货');
                    html += `<tr>
                        <td>${o.id}</td>
                        <td>${o.phone}</td>
                        <td>${o.goods_id}</td>
                        <td>${o.price}</td>
                        <td>${statusText}</td>
                        <td>${o.create_time}</td>
                        <td>
                            <select id="orderSel_${o.id}" class="mini-input">
                                <option value="wait" ${o.status==='wait'?'selected':''}>待发货</option>
                                <option value="send" ${o.status==='send'?'selected':''}>已发货</option>
                                <option value="done" ${o.status==='done'?'selected':''}>已收货</option>
                            </select>
                            <button onclick="changeOrderStatus(${o.id}, document.getElementById('orderSel_${o.id}').value)">修改</button>
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('orderTable').innerHTML = html;
        }

        function renderWithdraw() {
            let html = "";
            if (allWithdraws.length === 0) {
                html = "<tr><td colspan='6'>暂无提现申请</td></tr>";
            } else {
                allWithdraws.forEach(w => {
                    const statusText = w.status === 'wait' ? '待审核' : (w.status === 'pass' ? '已通过' : '已拒绝');
                    html += `<tr>
                        <td>${w.id}</td>
                        <td>${w.phone}</td>
                        <td>${w.bean_num}</td>
                        <td>${w.apply_time}</td>
                        <td>${statusText}</td>
                        <td>
                            ${w.status === 'wait' ? `
                                <button onclick="auditWithdraw(${w.id},'pass')">通过</button>
                                <button class="gray" onclick="auditWithdraw(${w.id},'refuse')">拒绝</button>
                            ` : '--'}
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('withdrawTable').innerHTML = html;
        }

        function renderRechargeLog() {
            let html = "";
            if (allRecharges.length === 0) {
                html = "<tr><td colspan='3'>暂无充值记录</td></tr>";
            } else {
                allRecharges.forEach(r => {
                    html += `<tr>
                        <td>${r.phone}</td>
                        <td>${r.amount}</td>
                        <td>${r.create_time}</td>
                    </tr>`;
                });
            }
            document.getElementById('rechargeLogTable').innerHTML = html;
        }

        function renderReleaseLog() {
            let html = "";
            if (allReleases.length === 0) {
                html = "<tr><td colspan='3'>暂无释放记录</td></tr>";
            } else {
                allReleases.forEach(r => {
                    html += `<tr>
                        <td>${r.date}</td>
                        <td>${r.user_count}</td>
                        <td>${r.executed_time}</td>
                    </tr>`;
                });
            }
            document.getElementById('releaseLogTable').innerHTML = html;
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
