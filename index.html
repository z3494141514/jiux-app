<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酒蕴茶乡 | 登录注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #6b1414 0%, #942222 50%, #b83030 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        .brand-wrap {
            text-align: center;
            padding: 60px 20px 40px;
            animation: fadeInDown 1s ease forwards;
            opacity: 0;
        }
        .brand-logo-text {
            font-size: 36px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .brand-slogan {
            color: #f0d8b8;
            font-size: 15px;
            margin-top: 12px;
            letter-spacing: 2px;
        }
        .container {
            padding: 0 20px 40px;
            animation: fadeInUp 1s ease 0.3s forwards;
            opacity: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .tab-nav {
            display: flex;
            position: relative;
            height: 56px;
            background: rgba(235, 228, 218, 0.6);
        }
        .tab-item {
            flex: 1;
            line-height: 56px;
            text-align: center;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            z-index: 2;
        }
        .tab-item.active {
            color: #8c1c13;
            font-weight: 500;
        }
        .tab-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, #8c1c13, #b83030);
            border-radius: 3px;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }
        .form-content {
            padding: 30px 24px;
        }
        .form-panel {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .form-panel.show {
            display: block;
        }
        .input-box {
            margin-bottom: 22px;
        }
        .input-box input {
            width: 100%;
            height: 54px;
            padding: 0 18px;
            background: #f9f5ee;
            border: 1px solid #e8ddd0;
            border-radius: 14px;
            font-size: 15px;
            color: #333;
            transition: all 0.3s ease;
        }
        .input-box input:focus {
            outline: none;
            border-color: #8c1c13;
            box-shadow: 0 0 0 4px rgba(140, 28, 19, 0.12);
            background: #fff;
        }
        .input-tip {
            font-size: 12px;
            color: #999;
            margin: 6px 0 0 6px;
        }
        .submit-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 500;
            color: #fff;
            background: linear-gradient(135deg, #8c1c13, #b83030);
            box-shadow: 0 6px 16px rgba(140, 28, 19, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 8px rgba(140, 28, 19, 0.2);
        }
        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="brand-wrap">
        <div class="brand-logo-text">酒蕴茶乡</div>
        <div class="brand-slogan">甄选天下好酒 · 茗品万千茶香</div>
    </div>

    <div class="container">
        <div class="auth-card">
            <div class="tab-nav">
                <div class="tab-item active" data-type="login">账号登录</div>
                <div class="tab-item" data-type="register">新用户注册</div>
                <div class="tab-line"></div>
            </div>

            <div class="form-content">
                <div class="form-panel show" id="loginPanel">
                    <div class="input-box">
                        <input type="text" id="loginAccount" placeholder="请输入11位手机号">
                    </div>
                    <div class="input-box">
                        <input type="password" id="loginPwd" placeholder="请输入登录密码">
                    </div>
                    <button class="submit-btn" onclick="doLogin()">立即登录</button>
                </div>

                <div class="form-panel" id="registerPanel">
                    <div class="input-box">
                        <input type="text" id="regPhone" placeholder="请输入11位手机号">
                        <div class="input-tip">手机号即为您的会员ID与邀请码</div>
                    </div>
                    <div class="input-box">
                        <input type="password" id="regPwd" placeholder="请设置登录密码（至少6位）">
                    </div>
                    <div class="input-box">
                        <input type="text" id="inviteCode" placeholder="邀请码（选填）">
                        <div class="input-tip">填写邀请码可绑定上级关系</div>
                    </div>
                    <button class="submit-btn" onclick="doRegister()">立即注册</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = "/api";
        const tabItems = document.querySelectorAll('.tab-item');
        const tabLine = document.querySelector('.tab-line');
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const toast = document.getElementById('toast');

        tabItems.forEach((tab, idx) => {
            tab.addEventListener('click', function () {
                tabItems.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                tabLine.style.transform = `translateX(${idx * 100}%)`;
                const type = this.dataset.type;
                if (type === 'login') {
                    loginPanel.classList.add('show');
                    registerPanel.classList.remove('show');
                } else {
                    loginPanel.classList.remove('show');
                    registerPanel.classList.add('show');
                }
            })
        });

        function showToast(text) {
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        async function doLogin() {
            const phone = document.getElementById('loginAccount').value.trim();
            const pwd = document.getElementById('loginPwd').value.trim();

            if (!phone) return showToast('请输入手机号');
            if (!/^1\d{10}$/.test(phone)) return showToast('请输入正确11位手机号');
            if (!pwd) return showToast('请输入密码');

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pwd })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('登录成功');
                    localStorage.setItem("loginUser", JSON.stringify(data.user));
                    setTimeout(() => location.href = "mall.html", 1200);
                } else {
                    showToast(data.msg || '登录失败');
                }
            } catch (err) {
                showToast('服务器连接失败');
            }
        }

        async function doRegister() {
            const phone = document.getElementById('regPhone').value.trim();
            const pwd = document.getElementById('regPwd').value.trim();
            const invite = document.getElementById('inviteCode').value.trim();

            if (!phone) return showToast('请输入手机号');
            if (!/^1\d{10}$/.test(phone)) return showToast('请输入正确11位手机号');
            if (pwd.length < 6) return showToast('密码至少6位');

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pwd, inviteCode: invite })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('注册成功，请登录');
                    tabItems[0].click();
                } else {
                    showToast(data.msg || '注册失败');
                }
            } catch (err) {
                showToast('服务器连接失败');
            }
        }
    </script>
</body>
</html>
