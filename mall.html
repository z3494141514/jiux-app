<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酒蕴茶乡 · 尊享商城</title>
    <style>
        :root {
            --primary: #8c1c13;
            --gold: #c9a15e;
            --bg: #faf7f2;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }
        .header {
            position: sticky; top:0; z-index:100;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header .logo { font-size:20px; font-weight:600; letter-spacing:2px; color:var(--primary); margin-right:20px; }
        .search-box { flex:1; height:38px; background:rgba(0,0,0,0.03); border:1px solid rgba(0,0,0,0.08); border-radius:20px; padding:0 18px; font-size:14px; }
        .page { display:none; }
        .page.active { display:block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        .banner { margin: 16px; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
        .banner img { width:100%; display:block; }
        .section-title { display:flex; align-items:center; margin:24px 16px 16px; }
        .section-title .line { width:4px; height:18px; background: linear-gradient(var(--primary), var(--gold)); border-radius:2px; margin-right:10px; }
        .section-title h3 { font-size:18px; font-weight:600; }
        /* 横向滑动商品 */
        .goods-scroll {
            display: flex;
            overflow-x: auto;
            gap: 14px;
            padding: 0 16px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .goods-card {
            flex: 0 0 75%;
            scroll-snap-align: start;
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }
        .goods-card img { width:100%; display:block; }
        .goods-info { padding:14px; }
        .goods-name { font-size:16px; font-weight:600; line-height:1.4; }
        .goods-price { font-size:18px; color:var(--primary); font-weight:700; margin:10px 0; }
        .buy-btn {
            display:block; width:100%; text-align:center; padding:10px 0;
            background:linear-gradient(135deg, #c9a15e, #8c1c13); color:#fff;
            border-radius:12px; text-decoration:none; font-weight:500; transition:opacity 0.2s;
        }
        .member-header {
            background:linear-gradient(135deg, #2d0a0a, #5a1a1a); color:#fff;
            padding:30px 20px; display:flex; align-items:center;
        }
        .avatar { width:70px; height:70px; border-radius:50%; border:2px solid var(--gold); margin-right:18px; }
        .member-info { display:flex; flex-direction:column; gap:6px; }
        .member-phone { font-size:18px; font-weight:600; }
        .member-invite-row { display:flex; align-items:center; gap:8px; font-size:13px; opacity:0.9; }
        .copy-btn { background:none; border:none; color:#fff; cursor:pointer; font-size:14px; padding:2px 6px; }
        .level-badge { display:inline-block; background:var(--gold); color:#fff; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .asset-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; }
        .asset-item { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:var(--shadow); }
        .asset-label { font-size:13px; color:#888; margin-bottom:6px; }
        .asset-value { font-size:22px; font-weight:700; }
        .action-row { display:flex; gap:12px; padding:0 16px 16px; }
        .action-btn {
            flex:1; background:linear-gradient(135deg, #c9a15e, #8c1c13);
            border:none; border-radius:14px; color:#fff; padding:14px;
            font-weight:600; font-size:16px; letter-spacing:1px;
        }
        .order-tabs, .section-card { background:var(--card-bg); margin:0 16px 16px; border-radius:18px; padding:16px; box-shadow:var(--shadow); }
        .order-tab-header { display:flex; border-bottom:1px solid #eee; margin-bottom:12px; }
        .order-tab-item { flex:1; text-align:center; padding:10px; color:#999; font-weight:500; position:relative; cursor:pointer; }
        .order-tab-item.active { color:var(--primary); }
        .order-tab-item.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:24px; height:3px; background:var(--primary); border-radius:2px; }
        .order-empty { text-align:center; color:#ccc; padding:30px 0; font-size:14px; }
        .order-item, .withdraw-item {
            padding:14px 0; border-bottom:1px solid #f5f5f5; display:flex; flex-direction:column; gap:6px;
        }
        .withdraw-item { cursor:pointer; }
        .info-row { display:flex; justify-content:space-between; align-items:center; }
        .label { color:#888; font-size:13px; }
        .value { font-weight:500; font-size:14px; }
        .status-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-wait { background:#fff3e0; color:#e65100; }
        .status-pass { background:#e8f5e9; color:#2e7d32; }
        .status-refuse { background:#ffebee; color:#c62828; }
        .status-send { background:#e3f2fd; color:#1565c0; }
        .status-done { background:#f3e5f5; color:#6a1b9a; }
        .confirm-btn { background:var(--primary); color:#fff; border:none; border-radius:8px; padding:4px 12px; font-size:13px; align-self:flex-start; }
        .footer { position:fixed; bottom:0; left:0; width:100%; background:rgba(255,255,255,0.9); backdrop-filter:blur(20px); display:flex; border-top:1px solid #eee; padding:6px 0; z-index:100; }
        .footer-item { flex:1; text-align:center; color:#999; padding:6px 0; }
        .footer-item.active { color:var(--primary); }
        .footer-item span { font-size:12px; display:block; margin-top:2px; }
        .pop { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:20px; padding:24px; width:85%; max-width:360px; z-index:200; box-shadow:0 20px 40px rgba(0,0,0,0.2); display:none; }
        .pop.active { display:block; }
        .mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:199; display:none; }
        .mask.active { display:block; }
        .pop input { width:100%; height:44px; background:#f5f5f5; border:none; border-radius:10px; padding:0 14px; margin-bottom:12px; }
        .btn-group { display:flex; gap:10px; margin-top:10px; }
        .btn-group button { flex:1; height:44px; border-radius:12px; border:none; font-weight:600; }
        .btn-cancel { background:#eee; color:#333; }
        .btn-submit { background:linear-gradient(135deg, #c9a15e, #8c1c13); color:#fff; }
        .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); background:rgba(0,0,0,0.75); color:#fff; padding:14px 28px; border-radius:30px; z-index:300; opacity:0; transition:0.3s; pointer-events:none; }
        .toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    </style>
</head>
<body>
    <div class="header"><div class="logo">酒蕴茶乡</div><input class="search-box" placeholder="搜索好物..."></div>
    <div class="page active" id="homePage">
        <div class="banner"><img src="https://picsum.photos/750/320?wine01" alt=""></div>
        <div class="section-title"><div class="line"></div><h3>甄选好物</h3></div>
        <div class="goods-scroll" id="goodsContainer"></div>
    </div>
    <div class="page" id="cartPage"><div style="text-align:center; padding:80px 20px; color:#ccc;">🛒<br>购物车空空如也</div></div>
    <div class="page" id="memberPage">
        <div class="member-header">
            <img class="avatar" src="https://picsum.photos/120/120?avatar">
            <div class="member-info">
                <div class="member-phone" id="memberPhone">--</div>
                <div class="member-invite-row">
                    邀请码：<span id="memberInvite">--</span>
                    <button class="copy-btn" onclick="copyInvite()" title="复制邀请码">📋</button>
                </div>
                <div><span class="level-badge" id="memberLevel">普通会员</span></div>
            </div>
        </div>
        <div class="asset-cards">
            <div class="asset-item"><div class="asset-label">总算力</div><div class="asset-value" id="powerVal">0</div></div>
            <div class="asset-item"><div class="asset-label">数字资产</div><div class="asset-value" id="assetVal">0.00</div></div>
            <div class="asset-item"><div class="asset-label">酒豆</div><div class="asset-value" id="beanVal">0</div></div>
            <div class="asset-item"><div class="asset-label">酒令</div><div class="asset-value" id="tokenVal">0</div></div>
        </div>
        <div class="action-row">
            <button class="action-btn" onclick="assetToBean()">资产转酒豆</button>
            <button class="action-btn" onclick="openWithdraw()">酒豆提现</button>
        </div>
        <div class="order-tabs">
            <div class="order-tab-header">
                <div class="order-tab-item active" data-status="wait">待发货</div>
                <div class="order-tab-item" data-status="send">已发货</div>
                <div class="order-tab-item" data-status="done">已收货</div>
            </div>
            <div id="orderList" class="order-empty">加载中...</div>
        </div>
        <div class="section-card">
            <div style="font-weight:600; margin-bottom:12px; font-size:16px;">提现记录</div>
            <div id="withdrawList" class="order-empty">暂无记录</div>
        </div>
        <div style="padding:0 16px 16px; display:flex; gap:10px;">
            <button style="flex:1; background:#f5f5f5; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:600;" onclick="openPwdPop()">修改密码</button>
            <button style="flex:1; background:#f5f5f5; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:600;" onclick="logout()">退出登录</button>
        </div>
    </div>
    <div class="footer">
        <div class="footer-item active" data-page="home"><div>🏠</div><span>首页</span></div>
        <div class="footer-item" data-page="cart"><div>🛒</div><span>购物车</span></div>
        <div class="footer-item" data-page="member"><div>👤</div><span>我的</span></div>
    </div>
    <div class="mask" id="mask"></div>
    <div class="pop" id="withdrawPop">
        <h4 style="text-align:center; margin-bottom:18px;">酒豆提现</h4>
        <input type="number" id="withdrawNum" placeholder="提现数量">
        <input type="text" id="withdrawAddr" placeholder="提现地址">
        <div class="btn-group"><button class="btn-cancel" onclick="closePop()">取消</button><button class="btn-submit" onclick="submitWithdraw()">提交</button></div>
    </div>
    <div class="pop" id="pwdPop">
        <h4 style="text-align:center; margin-bottom:18px;">修改密码</h4>
        <input type="password" id="oldPwd" placeholder="旧密码">
        <input type="password" id="newPwd" placeholder="新密码（至少6位）">
        <div class="btn-group"><button class="btn-cancel" onclick="closePop()">取消</button><button class="btn-submit" onclick="changePwd()">确认</button></div>
    </div>
    <div class="pop" id="withdrawDetailPop">
        <h4 style="text-align:center; margin-bottom:18px;">提现详情</h4>
        <div id="withdrawDetailContent" style="line-height:2; font-size:14px;"></div>
        <div class="btn-group"><button class="btn-cancel" onclick="closePop()">关闭</button></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const API = '/api';
        let curOrderStatus = 'wait';

        function showToast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
        function closePop(){ document.getElementById('mask').classList.remove('active'); document.querySelectorAll('.pop').forEach(p=>p.classList.remove('active')); }

        document.querySelectorAll('.footer-item').forEach(item=>{
            item.addEventListener('click', function(){
                document.querySelectorAll('.footer-item').forEach(i=>i.classList.remove('active'));
                this.classList.add('active');
                const page = this.dataset.page;
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                if(page==='home') document.getElementById('homePage').classList.add('active');
                else if(page==='cart') document.getElementById('cartPage').classList.add('active');
                else if(page==='member') { document.getElementById('memberPage').classList.add('active'); loadMemberData(); loadOrders('wait'); }
            })
        });

        async function loadGoods(){
            const res = await fetch(`${API}/goods-list`);
            const data = await res.json();
            const list = data.list || [];
            let html='';
            list.forEach(g=>{
                html+=`<div class="goods-card">
                    <img src="${g.image_url}" alt="${g.name}">
                    <div class="goods-info">
                        <div class="goods-name">${g.name}</div>
                        <div class="goods-price">¥ ${g.price}</div>
                        <a href="pay.html?gid=${g.id}&price=${g.price}" class="buy-btn">立即购买</a>
                    </div></div>`;
            });
            document.getElementById('goodsContainer').innerHTML=html||'<p style="text-align:center;padding:30px;">暂无商品</p>';
        }

        function copyInvite(){ navigator.clipboard.writeText(document.getElementById('memberInvite').innerText).then(()=>showToast('复制成功')); }

        async function loadMemberData(){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            if(!user.phone) return;
            const res = await fetch(`${API}/user?phone=${user.phone}`);
            const data = await res.json();
            if(data.code===0){
                const u=data.user;
                localStorage.setItem('loginUser',JSON.stringify(u));
                document.getElementById('memberPhone').innerText=u.phone;
                document.getElementById('memberInvite').innerText=u.invite_code||'--';
                document.getElementById('memberLevel').innerText=u.levelName||'普通会员';
                document.getElementById('powerVal').innerText=u.power||0;
                document.getElementById('assetVal').innerText=u.asset||'0.00';
                document.getElementById('beanVal').innerText=u.bean||0;
                document.getElementById('tokenVal').innerText=u.token||0;
            }
            loadWithdrawLog();
        }

        async function loadOrders(status){
            curOrderStatus=status;
            document.querySelectorAll('.order-tab-item').forEach(t=>t.classList.remove('active'));
            document.querySelector(`.order-tab-item[data-status="${status}"]`).classList.add('active');
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res = await fetch(`${API}/user-orders?phone=${user.phone}`);
            const data = await res.json();
            const orders=(data.orders||[]).filter(o=>o.status===status);
            let html='';
            if(orders.length===0) html='<div class="order-empty">暂无订单</div>';
            else orders.forEach(o=>{
                const statusMap={wait:'待发货',send:'已发货',done:'已收货'};
                html+=`<div class="order-item">
                    <div class="info-row"><span class="label">商品</span><span class="value">${o.goods_name||o.goods_id}</span></div>
                    <div class="info-row"><span class="label">金额</span><span class="value">¥${o.price}</span></div>
                    <div class="info-row"><span class="label">时间</span><span class="value" style="font-size:13px;">${o.create_time}</span></div>
                    <div class="info-row"><span class="label">状态</span><span class="status-badge status-${o.status}">${statusMap[o.status]}</span></div>
                    ${o.status==='send'?`<button class="confirm-btn" onclick="confirmOrder(${o.id})">确认收货</button>`:''}
                </div>`;
            });
            document.getElementById('orderList').innerHTML=html;
        }
        document.querySelectorAll('.order-tab-item').forEach(item=>item.addEventListener('click',()=>loadOrders(item.dataset.status)));

        async function confirmOrder(id){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res=await fetch(`${API}/confirm-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone,orderId:id})});
            const data=await res.json();
            showToast(data.msg||'操作成功');
            loadOrders(curOrderStatus);
        }

        function openWithdraw(){ document.getElementById('mask').classList.add('active'); document.getElementById('withdrawPop').classList.add('active'); }
        async function submitWithdraw(){
            const num=parseInt(document.getElementById('withdrawNum').value);
            const addr=document.getElementById('withdrawAddr').value.trim();
            if(!num||num<=0) return showToast('请输入数量');
            if(!addr) return showToast('请输入地址');
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res=await fetch(`${API}/withdraw`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone,beanNum:num,address:addr})});
            const data=await res.json();
            showToast(data.msg||'提交失败');
            closePop();
            loadMemberData();
        }

        async function loadWithdrawLog(){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res=await fetch(`${API}/user-withdraws?phone=${user.phone}`);
            const data=await res.json();
            const list=data.list||[];
            let html='';
            if(list.length===0) html='<div class="order-empty">暂无记录</div>';
            else list.forEach(item=>{
                const statusMap={wait:'待审核',pass:'已通过',refuse:'已拒绝'};
                html+=`
                <div class="withdraw-item"
                     data-bean="${item.bean_num}"
                     data-address="${item.address || ''}"
                     data-time="${item.apply_time}"
                     data-status="${item.status}"
                     onclick="showWithdrawDetail(this)">
                    <div class="info-row"><span class="label">数量</span><span class="value">${item.bean_num} 酒豆</span></div>
                    <div class="info-row"><span class="label">时间</span><span class="value" style="font-size:13px;">${item.apply_time}</span></div>
                    <div class="info-row">
                        <span class="label">状态</span>
                        <span class="status-badge status-${item.status}">${statusMap[item.status]}</span>
                    </div>
                </div>`;
            });
            document.getElementById('withdrawList').innerHTML=html;
        }

        function showWithdrawDetail(el){
            const bean = el.dataset.bean;
            const address = el.dataset.address;
            const time = el.dataset.time;
            const status = el.dataset.status;
            const statusMap={wait:'待审核',pass:'已通过',refuse:'已拒绝'};
            document.getElementById('withdrawDetailContent').innerHTML=`
                <p><b>数量：</b>${bean} 酒豆</p>
                <p><b>地址：</b>${address || '未填写'}</p>
                <p><b>时间：</b>${time}</p>
                <p><b>状态：</b>${statusMap[status]}</p>
            `;
            document.getElementById('mask').classList.add('active');
            document.getElementById('withdrawDetailPop').classList.add('active');
        }

        function openPwdPop(){ document.getElementById('mask').classList.add('active'); document.getElementById('pwdPop').classList.add('active'); }
        async function changePwd(){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const oldPwd=document.getElementById('oldPwd').value;
            const newPwd=document.getElementById('newPwd').value;
            if(!oldPwd||!newPwd||newPwd.length<6) return showToast('密码至少6位');
            const res=await fetch(`${API}/change-pwd`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone,oldPwd,newPwd})});
            const data=await res.json();
            showToast(data.msg||'修改失败');
            closePop();
        }

        async function assetToBean(){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res=await fetch(`${API}/asset-to-bean`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone})});
            const data=await res.json();
            showToast(data.msg||'兑换完成');
            if(data.code===0){ await refreshLocalUser(); loadMemberData(); }
        }

        async function refreshLocalUser(){
            const user=JSON.parse(localStorage.getItem('loginUser')||'{}');
            const res=await fetch(`${API}/user?phone=${user.phone}`);
            const data=await res.json();
            if(data.code===0) localStorage.setItem('loginUser',JSON.stringify(data.user));
        }

        function logout(){ localStorage.removeItem('loginUser'); location.href='index.html'; }

        window.onload=async function(){
            if(!localStorage.getItem('loginUser')) return location.href='index.html';
            loadGoods();
            try{ await fetch(`${API}/release`); }catch(e){}
        }
    </script>
</body>
</html>
