<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酒蕴茶乡 - 商城首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        :root {
            --main: #8c1c13;
            --main-light: #b83030;
            --text-dark: #222;
            --text-gray: #666;
            --text-light: #999;
            --bg-page: #f8f3ed;
            --white: #ffffff;
            --shadow: 0 8px 24px rgba(140, 28, 19, 0.12);
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-dark);
            font-size: 14px;
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.94); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideRight {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-fade-up { animation: fadeInUp 0.7s ease forwards; }
        .animate-scale { animation: scaleIn 0.6s ease forwards; }
        .animate-fade { animation: fadeIn 0.8s ease forwards; }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 52px;
            background: linear-gradient(90deg, var(--main), var(--main-light));
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 999;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .search-box {
            flex: 1;
            height: 36px;
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            border: none;
            padding: 0 20px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .search-box:focus {
            box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
        }

        .banner {
            margin-top: 52px;
            width: 100%;
            overflow: hidden;
            position: relative;
            padding: 12px;
        }
        .banner-wrap {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .banner-list {
            display: flex;
            width: 300%;
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .banner-item { width: 100%; }
        .banner-item img { width: 100%; display: block; }

        .goods-head {
            margin: 0 16px 12px;
            display: flex;
            align-items: center;
            animation: slideRight 0.6s ease forwards;
        }
        .goods-line {
            width: 4px;
            height: 18px;
            background: linear-gradient(var(--main), var(--main-light));
            border-radius: 2px;
            margin-right: 10px;
        }
        .goods-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .goods-container {
            padding: 0 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .goods-card {
            width: calc(50% - 6px);
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.35s ease;
            animation: scaleIn 0.6s ease forwards;
            opacity: 0;
        }
        .goods-card:nth-child(1) { animation-delay: 0.1s; }
        .goods-card:nth-child(2) { animation-delay: 0.2s; }
        .goods-card:nth-child(3) { animation-delay: 0.3s; }
        .goods-card:nth-child(4) { animation-delay: 0.4s; }
        .goods-card:active {
            transform: translateY(-4px) scale(0.98);
            box-shadow: 0 12px 30px rgba(140, 28, 19, 0.18);
        }
        .goods-img { width: 100%; display: block; }
        .goods-info { padding: 14px; }
        .goods-name {
            font-size: 13px;
            color: var(--text-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }
        .goods-price {
            font-size: 16px;
            color: #e03c3c;
            font-weight: 600;
            margin: 10px 0;
        }
        .buy-btn {
            display: block;
            width: 100%;
            height: 36px;
            line-height: 36px;
            text-align: center;
            background: linear-gradient(135deg, var(--main), var(--main-light));
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(140, 28, 19, 0.2);
        }
        .buy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 6px rgba(140, 28, 19, 0.15);
        }

        .page { display: none; }
        .page.active { display: block; }

        .member-banner {
            margin-top: 52px;
            background: linear-gradient(135deg, var(--main), var(--main-light));
            padding: 35px 20px 25px;
            color: #fff;
            animation: fadeIn 0.8s ease forwards;
        }
        .member-top {
            display: flex;
            align-items: center;
        }
        .avatar-box {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: #fff;
            padding: 3px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            margin-right: 18px;
        }
        .avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .member-desc p {
            margin: 6px 0;
            font-size: 14px;
            opacity: 0.95;
        }
        .asset-panel {
            margin: 15px 12px;
            background: var(--white);
            border-radius: 20px;
            padding: 22px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.7s ease 0.2s forwards;
            opacity: 0;
        }
        .asset-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0e9e2;
            font-size: 14px;
        }
        .asset-row:last-child { border: none; }
        .btn-row{display:flex;gap:10px;margin-top:12px;}
        .exchange-btn,.withdraw-btn {
            flex:1;
            height:38px;
            background:#8c1c13;
            color:#fff;
            border:none;
            border-radius:10px;
        }

        .order-module {
            margin: 15px 12px;
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.7s ease 0.3s forwards;
            opacity: 0;
        }
        .order-tab {
            display: flex;
            position: relative;
            height: 40px;
            margin-bottom: 15px;
            border-bottom: 1px solid #f0e9e2;
        }
        .order-tab-item {
            flex: 1;
            text-align: center;
            line-height: 40px;
            font-size: 14px;
            color: var(--text-gray);
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
        }
        .order-tab-item.active {
            color: var(--main);
            font-weight: 500;
        }
        .tab-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 33.333%;
            height: 3px;
            background: linear-gradient(90deg, var(--main), var(--main-light));
            border-radius: 3px;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }
        .order-empty {
            text-align: center;
            color: var(--text-light);
            padding: 20px 0;
        }
        .order-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .logout {
            width: calc(100% - 24px);
            margin: 25px 12px;
            height: 48px;
            background: #f0e9e2;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-gray);
            transition: all 0.3s ease;
        }
        .logout:active { background: #e4d9cc; }

        .cart-empty-wrap {
            margin-top: 80px;
            text-align: center;
            color: var(--text-light);
            animation: fadeIn 0.8s ease forwards;
        }
        .cart-empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .footer-tab {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 62px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            border-top: 1px solid #f0e9e2;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
            z-index: 999;
        }
        .footer-item {
            flex: 1;
            text-align: center;
            padding-top: 8px;
            color: var(--text-gray);
            transition: color 0.3s ease;
        }
        .footer-item.active { color: var(--main); }
        .footer-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .footer-text { font-size: 12px; }

        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 提现弹窗 */
        .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9998;display:none;}
        .pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:340px;background:#fff;border-radius:16px;padding:20px;z-index:9999;display:none;}
        .pop h4{text-align:center;margin-bottom:15px;color:#8c1c13;}
        .pop input{width:100%;height:40px;padding:0 10px;border:1px solid #ddd;border-radius:8px;margin-bottom:15px;}
        .pop .btn-group{display:flex;gap:10px;}
        .pop button{flex:1;height:40px;border:none;border-radius:8px;}
        .pop .cancel{background:#eee;color:#333;}
        .pop .submit{background:#8c1c13;color:#fff;}
    </style>
</head>
<body>
    <header class="header">
        <input class="search-box" placeholder="搜索好酒、名茶、礼盒...">
    </header>

    <div class="page active" id="homePage">
        <div class="banner">
            <div class="banner-wrap">
                <div class="banner-list" id="bannerList">
                    <div class="banner-item"><img src="https://picsum.photos/750/320?wine01" alt=""></div>
                    <div class="banner-item"><img src="https://picsum.photos/750/320?tea01" alt=""></div>
                    <div class="banner-item"><img src="https://picsum.photos/750/320?gift01" alt=""></div>
                </div>
            </div>
        </div>

        <div class="goods-head">
            <span class="goods-line"></span>
            <span class="goods-title">甄选好物 · 人气推荐</span>
        </div>

        <div class="goods-container">
            <div class="goods-card">
                <img class="goods-img" src="https://picsum.photos/320/240?goods01">
                <div class="goods-info">
                    <div class="goods-name">陈年酱香纯粮白酒 窖藏500ml</div>
                    <div class="goods-price" data-price="298">¥ 298.00</div>
                    <a href="javascript:goPay(1,298)" class="buy-btn">立即购买</a>
                </div>
            </div>
            <div class="goods-card">
                <img class="goods-img" src="https://picsum.photos/320/240?goods02">
                <div class="goods-info">
                    <div class="goods-name">明前高山云雾绿茶 春茶250g</div>
                    <div class="goods-price" data-price="88">¥ 88.00</div>
                    <a href="javascript:goPay(2,88)" class="buy-btn">立即购买</a>
                </div>
            </div>
            <div class="goods-card">
                <img class="goods-img" src="https://picsum.photos/320/240?goods03">
                <div class="goods-info">
                    <div class="goods-name">烟酒茶组合高端礼盒 送礼首选</div>
                    <div class="goods-price" data-price="399">¥ 399.00</div>
                    <a href="javascript:goPay(3,399)" class="buy-btn">立即购买</a>
                </div>
            </div>
            <div class="goods-card">
                <img class="goods-img" src="https://picsum.photos/320/240?goods04">
                <div class="goods-info">
                    <div class="goods-name">52度浓香型老酒 纯粮酿造</div>
                    <div class="goods-price" data-price="168">¥ 168.00</div>
                    <a href="javascript:goPay(4,168)" class="buy-btn">立即购买</a>
                </div>
            </div>
        </div>
    </div>

    <div class="page" id="cartPage">
        <div class="cart-empty-wrap">
            <div class="cart-empty-icon">🛒</div>
            <p>购物车暂时空空如也</p>
            <p style="margin-top:8px;font-size:13px;">前往首页挑选心仪好物吧</p>
        </div>
    </div>

    <div class="page" id="memberPage">
        <div class="member-banner">
            <div class="member-top">
                <div class="avatar-box">
                    <img src="https://picsum.photos/120/120?avatar" alt="头像">
                </div>
                <div class="member-desc" id="memberInfo">
                    <p>会员ID：--</p>
                    <p>专属邀请码：--</p>
                </div>
            </div>
        </div>

        <div class="asset-panel">
            <div class="asset-row"><span>总算力</span><span id="powerVal">0</span></div>
            <div class="asset-row"><span>数字资产</span><span id="assetVal">0.00</span></div>
            <div class="asset-row"><span>酒豆</span><span id="beanVal">0</span></div>
            <div class="asset-row"><span>酒令(支付)</span><span id="tokenVal">0</span></div>
            <div class="btn-row">
                <button class="exchange-btn" onclick="assetToBean()">资产转酒豆</button>
                <button class="withdraw-btn" onclick="openWithdrawPop()">酒豆提现</button>
            </div>
        </div>

        <div class="order-module">
            <div class="order-tab">
                <div class="order-tab-item active" data-order="wait">待发货</div>
                <div class="order-tab-item" data-order="send">已发货</div>
                <div class="order-tab-item" data-order="done">已收货</div>
                <div class="tab-line"></div>
            </div>
            <div class="order-content" id="orderContent">
                <div class="order-empty">暂无相关订单</div>
            </div>
        </div>

        <button class="logout" onclick="logout()">退出登录</button>
    </div>

    <div class="footer-tab">
        <div class="footer-item active" data-page="home">
            <span class="footer-icon">🏠</span>
            <span class="footer-text">首页</span>
        </div>
        <div class="footer-item" data-page="cart">
            <span class="footer-icon">🛒</span>
            <span class="footer-text">购物车</span>
        </div>
        <div class="footer-item" data-page="member">
            <span class="footer-icon">👤</span>
            <span class="footer-text">会员中心</span>
        </div>
    </div>

    <!-- 提现弹窗 -->
    <div class="mask" id="mask"></div>
    <div class="pop" id="withdrawPop">
        <h4>酒豆提现申请</h4>
        <input type="number" id="withdrawNum" placeholder="请输入提现酒豆数量" min="1">
        <div class="btn-group">
            <button class="cancel" onclick="closeWithdrawPop()">取消</button>
            <button class="submit" onclick="submitWithdraw()">提交申请</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = "/api/data";
        let globalConfig = {};
        let loginUser = null;

        // 轮播
        let bannerIndex = 0;
        const bannerList = document.getElementById('bannerList');
        function autoBanner() {
            bannerIndex++;
            if (bannerIndex >= 3) bannerIndex = 0;
            bannerList.style.transform = `translateX(-${bannerIndex * 100}%)`;
        }
        setInterval(autoBanner, 3000);

        // 提示框
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1800);
        }

        // 加载全局配置 + 每日算力释放
        async function loadConfigAndRelease() {
            let res = await fetch(API);
            let json = await res.json();
            let allData = JSON.parse(json.data);
            globalConfig = allData.config;
            await doDailyRelease(allData);
        }

        // 每日算力自动释放
        async function doDailyRelease(allData) {
            const now = new Date();
            const todayStr = now.toLocaleDateString();
            const nowHour = now.getHours();
            const releaseHour = globalConfig.releaseHour;
            const rate = globalConfig.releaseRate;

            let todayLog = allData.releaseLog.find(x => x.date === todayStr);
            if (todayLog) return;
            if (nowHour < releaseHour) return;

            let count = 0;
            allData.users.forEach(user => {
                let power = parseFloat(user.power) || 0;
                if (power <= 0) return;
                let addAsset = power * rate;
                let asset = parseFloat(user.asset) || 0;
                user.asset = (asset + addAsset).toFixed(2);
                count++;
            });

            allData.releaseLog.push({
                date: todayStr,
                userCount: count,
                fullTime: now.toLocaleString()
            });

            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: JSON.stringify(allData) })
            });
            refreshLocalUser();
        }

        // 刷新本地用户数据
        async function refreshLocalUser() {
            let res = await fetch(API);
            let json = await res.json();
            let allData = JSON.parse(json.data);
            let userStr = localStorage.getItem("loginUser");
            if(!userStr) return;
            let u = JSON.parse(userStr);
            let newUser = allData.users.find(x => x.phone === u.phone);
            if(newUser) localStorage.setItem("loginUser", JSON.stringify(newUser));
        }

        // 数字资产转酒豆
        async function assetToBean() {
            let userStr = localStorage.getItem("loginUser");
            if(!userStr) return;
            let user = JSON.parse(userStr);
            let asset = parseFloat(user.asset) || 0;
            if(asset <= 0) {
                showToast("暂无数字资产可兑换");
                return;
            }
            let rate = globalConfig.assetToBeanRate;
            let addBean = Math.floor(asset * rate);
            user.asset = "0.00";
            user.bean = (parseInt(user.bean) || 0) + addBean;

            let res = await fetch(API);
            let json = await res.json();
            let allData = JSON.parse(json.data);
            let idx = allData.users.findIndex(x=>x.phone === user.phone);
            if(idx > -1) allData.users[idx] = user;
            await fetch(API,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({data:JSON.stringify(allData)})
            });
            localStorage.setItem("loginUser", JSON.stringify(user));
            loadMemberData();
            showToast(`兑换成功！获得 ${addBean} 酒豆`);
        }

        // ========== 酒豆提现弹窗 ==========
        function openWithdrawPop(){
            document.getElementById('mask').style.display = 'block';
            document.getElementById('withdrawPop').style.display = 'block';
            document.getElementById('withdrawNum').value = '';
        }
        function closeWithdrawPop(){
            document.getElementById('mask').style.display = 'none';
            document.getElementById('withdrawPop').style.display = 'none';
        }

        // 提交提现申请
        async function submitWithdraw(){
            let num = parseInt(document.getElementById('withdrawNum').value);
            if(!num || num <= 0){
                showToast("请输入合法提现数量");
                return;
            }
            let userStr = localStorage.getItem("loginUser");
            if(!userStr) return;
            let user = JSON.parse(userStr);
            let bean = parseInt(user.bean)||0;
            if(bean < num){
                showToast("酒豆余额不足");
                return;
            }

            // 提交提现记录到后台
            let res = await fetch(API);
            let json = await res.json();
            let allData = JSON.parse(json.data);

            allData.withdrawLog.push({
                phone: user.phone,
                beanNum: num,
                applyTime: new Date().toLocaleString(),
                status: "wait"  // wait待审核 pass通过 refuse拒绝
            });

            await fetch(API,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({data:JSON.stringify(allData)})
            });

            closeWithdrawPop();
            showToast("提现申请已提交，请等待后台审核");
        }

        // 底部导航切换
        const footerItems = document.querySelectorAll('.footer-item');
        const pages = document.querySelectorAll('.page');
        footerItems.forEach(item => {
            item.addEventListener('click', function () {
                let pageType = this.dataset.page;
                footerItems.forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                pages.forEach(p => p.classList.remove('active'));
                if (pageType === 'home') {
                    document.getElementById('homePage').classList.add('active');
                } else if (pageType === 'cart') {
                    document.getElementById('cartPage').classList.add('active');
                } else if (pageType === 'member') {
                    document.getElementById('memberPage').classList.add('active');
                    loadMemberData();
                    switchOrderTab(0);
                }
            })
        });

        // 订单Tab切换
        const orderTabs = document.querySelectorAll('.order-tab-item');
        const tabLine = document.querySelector('.tab-line');
        function switchOrderTab(idx) {
            orderTabs.forEach(t => t.classList.remove('active'));
            orderTabs[idx].classList.add('active');
            tabLine.style.transform = `translateX(${idx * 100}%)`;
            renderOrder(idx);
        }
        orderTabs.forEach((tab, idx) => {
            tab.addEventListener('click', () => switchOrderTab(idx));
        });

        // 跳转支付页
        function goPay(goodsId, price) {
            location.href = `pay.html?gid=${goodsId}&price=${price}`;
        }

        // 加载会员数据
        function loadMemberData() {
            let user = JSON.parse(localStorage.getItem("loginUser") || "{}");
            if (!user.phone) return;
            loginUser = user;
            document.getElementById('memberInfo').innerHTML = `
                <p>会员ID：${user.phone}</p>
                <p>专属邀请码：${user.inviteCode || user.phone}</p>
            `;
            document.getElementById('powerVal').innerText = user.power || "0";
            document.getElementById('assetVal').innerText = user.asset || "0.00";
            document.getElementById('beanVal').innerText = user.bean || "0";
            document.getElementById('tokenVal').innerText = user.token || "0";
            switchOrderTab(0);
        }

        // 渲染订单
        function renderOrder(tabIndex) {
            let user = JSON.parse(localStorage.getItem("loginUser") || "{}");
            const orderList = user.orderList || [];
            let type = ['wait','send','done'][tabIndex];
            let filterList = orderList.filter(item => item.status === type);
            const content = document.getElementById('orderContent');
            if (filterList.length === 0) {
                content.innerHTML = '<div class="order-empty">暂无相关订单</div>';
                return;
            }
            let html = '';
            filterList.forEach(item => {
                html += `
                    <div class="order-item">
                        <div>商品编号：${item.goodsId}</div>
                        <div>支付金额：¥${item.price}</div>
                        <div>下单时间：${item.time}</div>
                        <div>状态：${item.status==='wait'?'待发货':item.status==='send'?'已发货':'已收货'}</div>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem("loginUser");
            showToast('已安全退出登录');
            setTimeout(() => location.href = "index.html", 1200);
        }

        window.onload = async function () {
            let user = localStorage.getItem("loginUser");
            if (!user) {
                location.href = "index.html";
                return;
            }
            await loadConfigAndRelease();
        }
    </script>
</body>
</html>
