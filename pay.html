<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>确认支付</title>
    <style>
        :root { --primary:#8c1c13; --gold:#c9a15e; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(135deg, #faf7f2, #f0e9df);
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            padding: 20px;
        }
        .card {
            width:100%;
            max-width:380px;
            background:#fff;
            border-radius:24px;
            padding:30px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }
        .title {
            text-align:center;
            font-size:20px;
            font-weight:600;
            color: var(--primary);
            margin-bottom:20px;
        }
        .goods-preview {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .goods-preview img {
            width: 70px; height: 70px;
            border-radius: 12px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .goods-preview .name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .goods-preview .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 18px;
        }
        /* 骨架屏占位 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .row {
            display:flex;
            justify-content: space-between;
            align-items: center;
            padding:14px 0;
            border-bottom:1px solid #f0f0f0;
        }
        .row:last-child { border:none; }
        .label { color:#666; }
        .value { font-weight:600; }
        .highlight { color: var(--primary); font-size:18px; }
        .tip {
            background: #faf7f2;
            border-radius:12px;
            padding:14px;
            margin:20px 0;
            font-size:13px;
            color:#888;
            line-height:1.6;
        }
        .address-section {
            margin: 20px 0;
            padding: 16px;
            background: #faf7f2;
            border-radius: 12px;
        }
        .address-section .current-address {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .address-section .edit-btn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 12px;
            color: #666;
        }
        .address-input {
            width: 100%;
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .address-input input {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .address-input button {
            height: 40px;
            padding: 0 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-group { display:flex; gap:12px; margin-top:20px; }
        .btn {
            flex:1; height:48px; border-radius:14px; border:none; font-weight:600; font-size:15px;
            transition: all 0.3s;
        }
        .btn-back { background:#f0f0f0; color:#333; }
        .btn-pay {
            background: linear-gradient(135deg, #c9a15e, #8c1c13);
            color:#fff;
            box-shadow: 0 8px 18px rgba(140,28,19,0.3);
        }
        .btn-pay:active { transform:scale(0.97); }
        .toast {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.75); color:#fff; padding:14px 28px; border-radius:30px;
            z-index:999; opacity:0; transition:0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">确认支付</div>

        <!-- 商品预览（用占位图快速显示，加载后替换） -->
        <div class="goods-preview">
            <img id="goodsImage" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="加载中">
            <div>
                <div class="name" id="goodsName"><span class="skeleton" style="display:inline-block;width:120px;height:16px;"></span></div>
                <div class="price" id="goodsPrice"><span class="skeleton" style="display:inline-block;width:80px;height:20px;"></span></div>
            </div>
        </div>

        <div class="row"><span class="label" id="payTypeLabel">所需酒令</span><span class="highlight" id="payAmount">--</span></div>
        <div class="row"><span class="label" id="balanceLabel">当前酒令</span><span id="balanceValue">--</span></div>
        <div class="row"><span class="label">赠送算力</span><span id="addPower">--</span></div>

        <div class="tip">
            支付成功后自动进入待发货订单。<br>算力倍数：<span id="ratio">--</span>x
        </div>

        <!-- 收货地址 -->
        <div class="address-section" id="addressSection">
            <div class="current-address" id="addressDisplay">
                <span id="addressText" style="font-size:14px;"><span class="skeleton" style="display:inline-block;width:200px;height:14px;"></span></span>
                <button class="edit-btn" onclick="showAddressInput()">修改</button>
            </div>
            <div class="address-input" id="addressInput" style="display:none;">
                <input type="text" id="addressField" placeholder="请输入收货地址">
                <button onclick="saveAddress()">保存</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-back" onclick="history.back()">取消</button>
            <button class="btn btn-pay" onclick="doPay()">确认支付</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const API = '/api';
        let goodsId, payPrice, currUser, globalPowerRatio=2, userAddress='', payType='token';

        function showToast(msg, cb){
            const t=document.getElementById('toast');
            t.innerText=msg; t.classList.add('show');
            setTimeout(()=>{ t.classList.remove('show'); if(cb) cb(); },2000);
        }

        // 并行加载所有数据
        async function loadData() {
            const url = new URL(location.href);
            goodsId = parseInt(url.searchParams.get('gid')) || 0;
            payPrice = parseInt(url.searchParams.get('price')) || 0;

            let userStr = localStorage.getItem('loginUser');
            if(!userStr) { location.href='index.html'; return; }
            try {
                const loginData = JSON.parse(userStr);
                currUser = loginData.user || loginData;
            } catch(e) { location.href='index.html'; return; }

            // 同时发起三个请求，谁先返回谁先处理
            const [goodsRes, userRes, configRes] = await Promise.all([
                fetch(`${API}/goods-detail?id=${goodsId}`).then(r => r.json()).catch(() => null),
                fetch(`${API}/user?phone=${currUser.phone}`).then(r => r.json()).catch(() => null),
                fetch(`${API}/config`).then(r => r.json()).catch(() => ({ config: {} }))
            ]);

            // 处理商品信息
            if (goodsRes && goodsRes.code === 0) {
                const g = goodsRes.good;
                document.getElementById('goodsImage').src = g.image_url;
                document.getElementById('goodsName').innerText = g.name;
                document.getElementById('goodsPrice').innerText = '¥' + g.price;
                document.getElementById('payAmount').innerText = payPrice;
                payType = g.pay_type || 'token';
                document.getElementById('payTypeLabel').innerText = payType === 'token' ? '所需酒令' : '所需酒豆';
                document.getElementById('balanceLabel').innerText = payType === 'token' ? '当前酒令' : '当前酒豆';
                const balance = payType === 'token' ? (currUser.token || 0) : (currUser.bean || 0);
                document.getElementById('balanceValue').innerText = balance;

                // 计算赠送算力（全局配置已获取）
                globalPowerRatio = configRes.config ? (Number(configRes.config.powerRatio) || 2) : 2;
                let calcPowerRatio = (g.power_ratio !== null && g.power_ratio !== undefined) ? Number(g.power_ratio) : globalPowerRatio;
                document.getElementById('addPower').innerText = Math.floor(payPrice * calcPowerRatio);
                document.getElementById('ratio').innerText = calcPowerRatio;
            } else {
                document.getElementById('goodsName').innerText = '商品信息加载失败';
            }

            // 处理地址信息
            if (userRes && userRes.code === 0) {
                userAddress = userRes.user.address || '';
                if (userAddress) {
                    document.getElementById('addressText').innerText = userAddress;
                } else {
                    document.getElementById('addressText').innerText = '暂无默认地址';
                    showAddressInput();
                }
            } else {
                document.getElementById('addressText').innerText = '暂无默认地址';
                showAddressInput();
            }
        }

        // 显示地址输入框
        function showAddressInput() {
            document.getElementById('addressDisplay').style.display = 'none';
            document.getElementById('addressInput').style.display = 'flex';
            document.getElementById('addressField').value = userAddress || '';
        }

        // 保存地址
        async function saveAddress() {
            const addr = document.getElementById('addressField').value.trim();
            if(!addr) return showToast('请输入地址');
            const res = await fetch(`${API}/save-address`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: currUser.phone, address: addr })
            });
            const data = await res.json();
            if(data.code === 0) {
                userAddress = addr;
                document.getElementById('addressText').innerText = addr;
                document.getElementById('addressInput').style.display = 'none';
                document.getElementById('addressDisplay').style.display = 'flex';
                showToast('地址已保存');
            } else {
                showToast(data.msg || '保存失败');
            }
        }

        // 支付
        async function doPay() {
            const finalAddr = userAddress || document.getElementById('addressText').innerText;
            if (!finalAddr || finalAddr === '暂无默认地址') {
                showAddressInput();
                return showToast('请先填写收货地址');
            }
            const res = await fetch(`${API}/pay`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phone: currUser.phone,
                    goodsId,
                    price: payPrice,
                    address: finalAddr
                })
            });
            const data = await res.json();
            if(data.code === 0) {
                localStorage.setItem('loginUser', JSON.stringify(data.user));
                showToast('支付成功', ()=> location.href='mall.html');
            } else {
                showToast(data.msg || '支付失败');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
