<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>确认支付</title>
    <style>
        :root {--primary:#8c1c13; --gold:#c9a15e;}
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(135deg, #faf7f2, #f0e9df);
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        }
        .card {
            width:90%;
            max-width:380px;
            background:#fff;
            border-radius:24px;
            padding:30px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }
        .title {
            text-align:center;
            font-size:20px;
            font-weight:600;
            color: var(--primary);
            margin-bottom:30px;
        }
        .row {
            display:flex;
            justify-content: space-between;
            align-items: center;
            padding:16px 0;
            border-bottom:1px solid #f0f0f0;
        }
        .row:last-child { border:none; }
        .label { color:#666; }
        .value { font-weight:600; }
        .highlight { color: var(--primary); font-size:18px; }
        .tip {
            background: #faf7f2;
            border-radius:12px;
            padding:14px;
            margin:20px 0;
            font-size:13px;
            color:#888;
            line-height:1.6;
        }
        .btn-group { display:flex; gap:12px; margin-top:20px; }
        .btn {
            flex:1; height:48px; border-radius:14px; border:none; font-weight:600; font-size:15px;
            transition: all 0.3s;
        }
        .btn-back { background:#f0f0f0; color:#333; }
        .btn-pay {
            background: linear-gradient(135deg, #c9a15e, #8c1c13);
            color:#fff;
            box-shadow: 0 8px 18px rgba(140,28,19,0.3);
        }
        .btn-pay:active { transform:scale(0.97); }
        .toast {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.75); color:#fff; padding:14px 28px; border-radius:30px;
            z-index:999; opacity:0; transition:0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">确认支付</div>
        <div class="row"><span class="label">商品编号</span><span class="value" id="gid">--</span></div>
        <div class="row"><span class="label">支付金额</span><span class="highlight" id="price">0</span></div>
        <div class="row"><span class="label">当前酒令</span><span id="token">0</span></div>
        <div class="row"><span class="label">赠送算力</span><span id="addPower">0</span></div>
        <div class="tip">
            支付成功后自动进入待发货订单。<br>算力倍数：<span id="ratio">2</span>x
        </div>
        <div class="btn-group">
            <button class="btn btn-back" onclick="history.back()">取消</button>
            <button class="btn btn-pay" onclick="doPay()">确认支付</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const API = '/api';
        let goodsId, payPrice, currUser, powerRatio=2;
        function showToast(msg, cb){
            const t=document.getElementById('toast');
            t.innerText=msg; t.classList.add('show');
            setTimeout(()=>{ t.classList.remove('show'); if(cb) cb(); },2000);
        }
        window.onload=async function(){
            let user=localStorage.getItem('loginUser');
            if(!user) return location.href='index.html';
            currUser=JSON.parse(user);
            const url=new URL(location.href);
            goodsId=parseInt(url.searchParams.get('gid'))||0;
            payPrice=parseInt(url.searchParams.get('price'))||0;
            document.getElementById('gid').innerText=goodsId;
            document.getElementById('price').innerText=payPrice;
            document.getElementById('token').innerText=currUser.token||0;
            const cfg=await fetch(`${API}/config`).then(r=>r.json());
            if(cfg.config) powerRatio=Number(cfg.config.powerRatio)||2;
            document.getElementById('ratio').innerText=powerRatio;
            document.getElementById('addPower').innerText=(payPrice*powerRatio).toFixed(0);
        }
        async function doPay(){
            const res=await fetch(`${API}/pay`,{
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone:currUser.phone, goodsId, price:payPrice})
            });
            const data=await res.json();
            if(data.code===0){
                localStorage.setItem('loginUser', JSON.stringify(data.user));
                showToast('支付成功', ()=> location.href='mall.html');
            } else showToast(data.msg||'支付失败');
        }
    </script>
</body>
</html>
